<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
padding:15px;
max-width:700px;
margin:auto;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#0066cc;
color:white;
border:none;
cursor:pointer;
}

.success{
color:green;
font-weight:bold;
}

#reader{
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>BMW Rework App V2</h2>

<div id="reader"></div>

<label>Serial Number</label>
<input id="serial">

<label>Defect</label>
<select id="defect">
<option>Loading...</option>
</select>

<label>Comment</label>
<textarea id="comment"></textarea>

<label>Quantity</label>
<input id="qty" type="number" value="1">

<label>Shift</label>
<select id="shift">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<label>Photo</label>
<input
type="file"
id="photo"
accept="image/*"
capture="environment">

<label>User</label>
<input id="user" value="Konrad">

<button onclick="saveData()">
SAVE
</button>

<div id="status"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby6V6Md2nCXcavnTMWOUILAPPWeQ_lE23NwQ1lnH6KIFmMhik8tSXHT2ihy-cgC9H27/exec";

loadDefects();

async function loadDefects(){

try{

const response =
await fetch(
API_URL + "?action=getDefects",
{
method:"GET"
}
);

const text =
await response.text();

console.log("API RESPONSE:");
console.log(text);

const data =
JSON.parse(text);

let html = "";

data.forEach(row=>{

html += `
<option value="${row[0]}|${row[1]}">
${row[0]} - ${row[1]}
</option>
`;

});

document.getElementById(
"defect"
).innerHTML = html;

}
catch(err){

console.error(err);

document.getElementById(
"defect"
).innerHTML =
"<option>ERROR</option>";

alert(
"Load defects error:\n\n" +
err.message
);

}

}

function onScanSuccess(text){

document.getElementById(
"serial"
).value = text;

navigator.vibrate?.(150);

}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
).render(onScanSuccess);

async function saveData(){

const serial =
document.getElementById("serial").value;

if(!serial){

alert("Scan QR first");

return;

}

const defect =
document.getElementById("defect").value;

const parts =
defect.split("|");

const file =
document.getElementById("photo").files[0];

let image = "";

if(file){

image =
await new Promise(resolve=>{

const reader =
new FileReader();

reader.onload =
e=>resolve(e.target.result);

reader.readAsDataURL(file);

});

}

const payload = {

serial:serial,
defectCode:parts[0] || "",
defectName:parts[1] || "",
comment:document.getElementById("comment").value,
qty:document.getElementById("qty").value,
shift:document.getElementById("shift").value,
user:document.getElementById("user").value,
image:image

};

const response =
await fetch(API_URL,{

method:"POST",
body:JSON.stringify(payload)

});

const result =
await response.json();

document.getElementById(
"status"
).innerHTML =
'<p class="success">Saved: ' +
result.id +
'</p>';

document.getElementById(
"comment"
).value="";

document.getElementById(
"photo"
).value="";

}

</script>

</body>

</html>
