LMS Resident App<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>
  X
</title>

<script
src="https://unpkg.com/html5-qrcode">
</script>


<style>

*{
box-sizing:border-box;
}

body{

font-family:
Arial,
Helvetica,
sans-serif;

max-width:720px;

margin:auto;

padding:15px;

background:#f3f5f7;

color:#222;

}

.app{

background:white;

padding:20px;

border-radius:12px;

box-shadow:
0 3px 15px
rgba(0,0,0,.12);

}

h1{

text-align:center;

font-size:25px;

margin:0;

}

.subtitle{

text-align:center;

color:#666;

margin-top:8px;

margin-bottom:25px;

}

#reader{

margin-bottom:20px;

}

.group{

margin-top:17px;

}

label{

display:block;

font-size:14px;

font-weight:bold;

margin-bottom:6px;

}

input,
select,
textarea,
button{

width:100%;

font-family:
Arial,
sans-serif;

font-size:16px;

border-radius:7px;

}

input,
select,
textarea{

padding:12px;

border:
1px solid #aaa;

background:white;

}

textarea{

min-height:90px;

resize:vertical;

}

button{

margin-top:25px;

padding:15px;

border:none;

background:#0066cc;

color:white;

font-weight:bold;

cursor:pointer;

}

button:disabled{

background:#999;

}

.required{

color:#d00000;

}

.info{

padding:13px;

background:#e8f1ff;

border-left:
5px solid #0066cc;

font-weight:bold;

margin-bottom:18px;

}

.success{

padding:14px;

margin-top:18px;

background:#e7f7eb;

border-left:
5px solid #28a745;

color:#176b2d;

font-weight:bold;

}

.error{

padding:14px;

margin-top:18px;

background:#ffe8e8;

border-left:
5px solid #d00000;

color:#9e0000;

font-weight:bold;

}

</style>

</head>


<body>


<div class="app">


<h1>

LMS Resident App

</h1>


<div class="subtitle">

Rework Data Registration

</div>


<div
id="loading"
class="info">

Loading dashboard...

</div>


<div id="reader">

</div>


<form id="form">


<div class="group">

<label>

Serial Number

<span class="required">

*

</span>

</label>


<input

id="serial"

required

autocomplete="off">

</div>


<div class="group">

<label>

Defect

<span class="required">

*

</span>

</label>


<select

id="defect"

required>

</select>

</div>


<div class="group">

<label>

Found at

<span class="required">

*

</span>

</label>


<select

id="foundAt"

required>

</select>

</div>


<div class="group">

<label>

Location

<span class="required">

*

</span>

</label>


<select

id="location"

required>

</select>

</div>


<div class="group">

<label>

LMS Contact Email

<span class="required">

*

</span>

</label>


<select

id="contact"

required>

</select>

</div>


<div class="group">

<label>

OEM

<span class="required">

*

</span>

</label>


<select

id="oem"

required>

</select>

</div>


<div class="group">

<label>

Comment

</label>


<textarea

id="comment">

</textarea>

</div>


<div class="group">

<label>

Quantity

<span class="required">

*

</span>

</label>


<input

id="qty"

type="number"

min="1"

value="1"

required>

</div>


<div class="group">

<label>

Customer Label

</label>


<input

id="labelPhoto"

type="file"

accept="image/*"

capture="environment">

</div>


<div class="group">

<label>

Failure Photo

</label>


<input

id="photo"

type="file"

accept="image/*"

capture="environment">

</div>


<div class="group">

<label>

User

<span class="required">

*

</span>

</label>


<input

id="user"

value="Konrad"

required>

</div>


<button

id="save"

type="submit">

SAVE RECORD

</button>


</form>


<div id="status">

</div>


</div>


<script>


/************************************************
 * GOOGLE APPS SCRIPT API
 ************************************************/

const API_URL =

"https://script.google.com/macros/s/AKfycby6V6Md2nCXcavnTMWOUILAPPWeQ_lE23NwQ1lnH6KIFmMhik8tSXHT2ihy-cgC9H27/exec";


/************************************************
 * VARIABLES
 ************************************************/

let saving = false;

let lastScan = "";

let lastScanTime = 0;


/************************************************
 * QR
 ************************************************/

function onScanSuccess(

text

){


const now =

Date.now();


if (

text === lastScan &&

now -

lastScanTime <

10000

) {

return;

}


lastScan = text;

lastScanTime = now;


document

.getElementById(

"serial"

)

.value = text;


if (

navigator.vibrate

) {

navigator.vibrate(

[100,50,100]

);

}


}


const scanner =

const scanner = new Html5QrcodeScanner(

  "reader",

  {

    fps: 20,

    qrbox: function(
      viewfinderWidth,
      viewfinderHeight
    ) {

      const size = Math.floor(

        Math.min(
          viewfinderWidth,
          viewfinderHeight
        ) * 0.75

      );

      return {

        width: size,

        height: size

      };

    },

    aspectRatio: 1.0,

    disableFlip: false,

    experimentalFeatures: {

      useBarCodeDetectorIfSupported: true

    },

    formatsToSupport: [

      Html5QrcodeSupportedFormats.QR_CODE,

      Html5QrcodeSupportedFormats.DATA_MATRIX,

      Html5QrcodeSupportedFormats.CODE_128,

      Html5QrcodeSupportedFormats.CODE_39

    ]

  },

  false

);


scanner.render(

onScanSuccess

);


/************************************************
 * DASHBOARD
 ************************************************/

async function loadDashboard(){


const loading =

document

.getElementById(

"loading"

);


try{


const response =

await fetch(

API_URL +

"?action=getDashboard"

);


const text =

await response.text();


let data;


try{

data =

JSON.parse(

text

);

}

catch(error){

throw new Error(

"API did not return JSON."

);

}


if (

data.status !==

"OK"

) {

throw new Error(

data.message ||

"Dashboard error"

);

}


fillDefects(

data.defects

);


fillSelect(

"foundAt",

data.foundAt,

"Select Found at"

);


fillSelect(

"location",

data.locations,

"Select Location"

);


fillSelect(

"contact",

data.contacts,

"Select LMS Contact"

);


fillSelect(

"oem",

data.oems,

"Select OEM"

);


loading.style.display =

"none";


}

catch(error){


console.error(

error

);


loading.className =

"error";


loading.textContent =

"Dashboard error: " +

error.message;


}


}


/************************************************
 * DEFECT SELECT
 ************************************************/

function fillDefects(

items

){


const select =

document

.getElementById(

"defect"

);


select.innerHTML =

'<option value="">' +

'Select defect' +

'</option>';


items.forEach(

function(item){


const option =

document

.createElement(

"option"

);


option.value =

item.code +

"|" +

item.description;


option.textContent =

item.code +

" - " +

item.description;


select.appendChild(

option

);


}

);


}


/************************************************
 * STANDARD SELECT
 ************************************************/

function fillSelect(

id,

items,

placeholder

){


const select =

document

.getElementById(

id

);


select.innerHTML =

"";


const first =

document

.createElement(

"option"

);


first.value =

"";


first.textContent =

placeholder;


select.appendChild(

first

);


items.forEach(

function(item){


const option =

document

.createElement(

"option"

);


option.value =

item;


option.textContent =

item;


select.appendChild(

option

);


}

);


}


/************************************************
 * PHOTO
 ************************************************/

function photoToBase64(

file

){


return new Promise(

function(

resolve,

reject

){


if (!file) {

resolve("");

return;

}


const reader =

new FileReader();


reader.onload =

function(event){

resolve(

event.target.result

);

};


reader.onerror =

function(){

reject(

new Error(

"Photo reading error."

)

);

};


reader.readAsDataURL(

file

);


}

);


}


/************************************************
 * SAVE
 ************************************************/

document

.getElementById(

"form"

)

.addEventListener(

"submit",

saveRecord

);


async function saveRecord(

event

){


event.preventDefault();


if (saving) {

return;

}


saving = true;


const button =

document

.getElementById(

"save"

);


button.disabled = true;

button.textContent =

"SAVING...";


try{


const defect =

document

.getElementById(

"defect"

)

.value

.split("|");


const label =

await photoToBase64(

document

.getElementById(

"labelPhoto"

)

.files[0]

);


const failure =

await photoToBase64(

document

.getElementById(

"photo"

)

.files[0]

);


const payload = {


serial:

value(

"serial"

),


defectCode:

defect[0],


defectName:

defect

.slice(1)

.join("|"),


foundAt:

value(

"foundAt"

),


location:

value(

"location"

),


contact:

value(

"contact"

),


oem:

value(

"oem"

),


comment:

value(

"comment"

),


qty:

value(

"qty"

),


user:

value(

"user"

),


labelImage:

label,


image:

failure


};


const response =

await fetch(

API_URL,

{

method:

"POST",

body:

JSON.stringify(

payload

)

}

);


const result =

await response.json();


if (

result.status ===

"DUPLICATE"

) {


alert(

"Serial Number already exists:\n\n" +

payload.serial

);


return;

}


if (

result.status !==

"OK"

) {

throw new Error(

result.message

);

}


showSuccess(

"Saved: " +

result.id +

" | " +

result.oem

);


resetForm();


}

catch(error){


console.error(

error

);


showError(

"Save error: " +

error.message

);


}

finally{


saving = false;


button.disabled = false;


button.textContent =

"SAVE RECORD";


}


}


/************************************************
 * HELPERS
 ************************************************/

function value(

id

){

return document

.getElementById(

id

)

.value

.trim();

}


function showSuccess(

message

){

document

.getElementById(

"status"

)

.innerHTML =

'<div class="success">' +

message +

'</div>';

}


function showError(

message

){

document

.getElementById(

"status"

)

.innerHTML =

'<div class="error">' +

message +

'</div>';

}


function resetForm(){


document

.getElementById(

"serial"

)

.value = "";


document

.getElementById(

"comment"

)

.value = "";


document

.getElementById(

"qty"

)

.value = "1";


document

.getElementById(

"labelPhoto"

)

.value = "";


document

.getElementById(

"photo"

)

.value = "";


}


/************************************************
 * START
 ************************************************/

loadDashboard();


</script>


</body>

</html>
