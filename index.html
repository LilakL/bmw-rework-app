<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>BMW Rework App V2</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
padding:15px;
max-width:700px;
margin:auto;
background:#f4f6f8;
}

.app{
background:#ffffff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 12px rgba(0,0,0,0.12);
}

h1{
text-align:center;
font-size:25px;
margin-top:0;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.form-group{
margin-top:17px;
}

label{
display:block;
font-size:14px;
font-weight:bold;
margin-bottom:6px;
}

input,
select,
textarea,
button{
width:100%;
font-size:16px;
font-family:Arial,sans-serif;
box-sizing:border-box;
border-radius:7px;
}

input,
select,
textarea{
padding:12px;
border:1px solid #aaa;
background:white;
}

textarea{
min-height:90px;
resize:vertical;
}

input:focus,
select:focus,
textarea:focus{
outline:none;
border:2px solid #0066cc;
}

button{
padding:15px;
margin-top:25px;
background:#0066cc;
color:white;
font-weight:bold;
border:none;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

#reader{
margin-bottom:20px;
}

#loading{
padding:13px;
margin-bottom:18px;
background:#e6f0ff;
border-left:5px solid #0066cc;
font-weight:bold;
}

.success{
padding:14px;
margin-top:18px;
background:#e7f7eb;
color:#176b2d;
border-left:5px solid #28a745;
font-weight:bold;
}

.error{
padding:14px;
margin-top:18px;
background:#ffe9e9;
color:#a00000;
border-left:5px solid #d60000;
font-weight:bold;
}

.required{
color:red;
}

</style>

</head>


<body>


<div class="app">


<h1>BMW Rework App V2</h1>

<div class="subtitle">

Rework Data Registration

</div>


<div id="loading">

Loading dashboard data...

</div>


<div id="reader"></div>


<form
id="reworkForm">


<!-- SERIAL NUMBER -->


<div class="form-group">

<label>

Serial Number

<span class="required">*</span>

</label>

<input
id="serial"
type="text"
required>

</div>


<!-- DEFECT -->


<div class="form-group">

<label>

Defect

<span class="required">*</span>

</label>

<select
id="defect"
required>

<option value="">

Loading...

</option>

</select>

</div>


<!-- FOUND AT -->


<div class="form-group">

<label>

Found at

<span class="required">*</span>

</label>

<select
id="foundAt"
required>

<option value="">

Loading...

</option>

</select>

</div>


<!-- LOCATION -->


<div class="form-group">

<label>

Location

<span class="required">*</span>

</label>

<select
id="location"
required>

<option value="">

Loading...

</option>

</select>

</div>


<!-- LMS CONTACT -->


<div class="form-group">

<label>

LMS Contact Email

<span class="required">*</span>

</label>

<select
id="contact"
required>

<option value="">

Loading...

</option>

</select>

</div>


<!-- OEM -->


<div class="form-group">

<label>

OEM

<span class="required">*</span>

</label>

<select
id="oem"
required>

<option value="">

Loading...

</option>

</select>

</div>


<!-- COMMENT -->


<div class="form-group">

<label>

Comment

</label>

<textarea
id="comment">

</textarea>

</div>


<!-- QUANTITY -->


<div class="form-group">

<label>

Quantity

<span class="required">*</span>

</label>

<input
id="qty"
type="number"
value="1"
min="1"
required>

</div>


<!-- CUSTOMER LABEL -->


<div class="form-group">

<label>

Customer Label

</label>

<input
id="labelPhoto"
type="file"
accept="image/*"
capture="environment">

</div>


<!-- FAILURE PHOTO -->


<div class="form-group">

<label>

Failure Photo

</label>

<input
id="photo"
type="file"
accept="image/*"
capture="environment">

</div>


<!-- USER -->


<div class="form-group">

<label>

User

<span class="required">*</span>

</label>

<input
id="user"
type="text"
value="Konrad"
required>

</div>


<button
id="saveButton"
type="submit">

SAVE RECORD

</button>


</form>


<div id="status"></div>


</div>


<script>


/************************************************
 * GOOGLE APPS SCRIPT API
 ************************************************/


const API_URL =

"https://script.google.com/macros/s/AKfycby6V6Md2nCXcavnTMWOUILAPPWeQ_lE23NwQ1lnH6KIFmMhik8tSXHT2ihy-cgC9H27/exec";


/************************************************
 * VARIABLES
 ************************************************/


let saveInProgress = false;

let lastScan = "";

let lastScanTime = 0;


/************************************************
 * QR SCANNER
 ************************************************/


function onScanSuccess(

decodedText

){


const currentTime =

Date.now();


if(

decodedText === lastScan

&&

currentTime - lastScanTime < 10000

){

return;

}


lastScan =

decodedText;


lastScanTime =

currentTime;


document

.getElementById(

"serial"

)

.value =

decodedText;


if(

navigator.vibrate

){

navigator.vibrate(

[100,50,100]

);

}


}


const qrScanner =

new Html5QrcodeScanner(

"reader",

{

fps:10,

qrbox:250

}

);


qrScanner.render(

onScanSuccess

);


/************************************************
 * LOAD DASHBOARD
 ************************************************/


async function loadDashboard(){


const loading =

document.getElementById(

"loading"

);


try{


const apiAddress =

API_URL +

"?action=getDashboard";


const response =

await fetch(

apiAddress

);


if(

!response.ok

){

throw new Error(

"HTTP " +

response.status

);

}


const dashboard =

await response.json();


if(

dashboard.status ===

"ERROR"

){

throw new Error(

dashboard.message

);

}


/*
DEFECT
*/


fillDefects(

dashboard.defects

);


/*
FOUND AT
*/


fillSelect(

"foundAt",

dashboard.foundAt,

"Select Found at"

);


/*
LOCATION
*/


fillSelect(

"location",

dashboard.locations,

"Select Location"

);


/*
CONTACT
*/


fillSelect(

"contact",

dashboard.contacts,

"Select LMS Contact"

);


/*
OEM
*/


fillSelect(

"oem",

dashboard.oems,

"Select OEM"

);


loading.style.display =

"none";


}
catch(error){


console.error(

error

);


loading.className =

"error";


loading.innerHTML =

"Dashboard loading error: " +

error.message;


}


}


/************************************************
 * DEFECT LIST
 ************************************************/


function fillDefects(

items

){


const select =

document.getElementById(

"defect"

);


select.innerHTML =

'<option value="">' +

'Select defect' +

'</option>';


if(

!Array.isArray(

items

)

){

return;

}


items.forEach(

function(item){


const option =

document.createElement(

"option"

);


option.value =

item.code +

"|" +

item.description;


option.textContent =

item.code +

" - " +

item.description;


select.appendChild(

option

);


}

);


}


/************************************************
 * STANDARD LIST
 ************************************************/


function fillSelect(

element,

items,

placeholder

){


const select =

document.getElementById(

element

);


select.innerHTML =

"";


const firstOption =

document.createElement(

"option"

);


firstOption.value =

"";


firstOption.textContent =

placeholder;


select.appendChild(

firstOption

);


if(

!Array.isArray(

items

)

){

return;

}


items.forEach(

function(item){


if(

!item

){

return;

}


const option =

document.createElement(

"option"

);


option.value =

item;


option.textContent =

item;


select.appendChild(

option

);


}

);


}


/************************************************
 * PHOTO TO BASE64
 ************************************************/


function readPhoto(

file

){


return new Promise(

function(

resolve,

reject

){


if(

!file

){

resolve("");

return;

}


const reader =

new FileReader();


reader.onload =

function(event){

resolve(

event.target.result

);

};


reader.onerror =

function(){

reject(

new Error(

"Photo reading error"

)

);

};


reader.readAsDataURL(

file

);


}

);


}


/************************************************
 * SAVE
 ************************************************/


document

.getElementById(

"reworkForm"

)

.addEventListener(

"submit",

saveData

);


async function saveData(

event

){


event.preventDefault();


if(

saveInProgress

){

return;

}


saveInProgress =

true;


const button =

document.getElementById(

"saveButton"

);


button.disabled =

true;


button.textContent =

"SAVING...";


try{


const defect =

document

.getElementById(

"defect"

)

.value

.split("|");


const labelPhoto =

await readPhoto(

document

.getElementById(

"labelPhoto"

)

.files[0]

);


const failurePhoto =

await readPhoto(

document

.getElementById(

"photo"

)

.files[0]

);


const payload = {


serial:

document

.getElementById(

"serial"

)

.value

.trim(),


defectCode:

defect[0],


defectName:

defect

.slice(1)

.join("|"),


foundAt:

document

.getElementById(

"foundAt"

)

.value,


location:

document

.getElementById(

"location"

)

.value,


contact:

document

.getElementById(

"contact"

)

.value,


oem:

document

.getElementById(

"oem"

)

.value,


comment:

document

.getElementById(

"comment"

)

.value,


qty:

document

.getElementById(

"qty"

)

.value,


user:

document

.getElementById(

"user"

)

.value,


labelImage:

labelPhoto,


image:

failurePhoto


};


const response =

await fetch(

API_URL,

{

method:

"POST",

body:

JSON.stringify(

payload

)

}

);


const result =

await response.json();


if(

result.status ===

"DUPLICATE"

){


alert(

"Serial Number already exists"

);


return;


}


if(

result.status !==

"OK"

){


throw new Error(

result.message

);


}


document

.getElementById(

"status"

)

.innerHTML =

'<div class="success">' +

'Saved: ' +

result.id +

'</div>';


document

.getElementById(

"serial"

)

.value =

"";


document

.getElementById(

"comment"

)

.value =

"";


document

.getElementById(

"qty"

)

.value =

"1";


document

.getElementById(

"photo"

)

.value =

"";


document

.getElementById(

"labelPhoto"

)

.value =

"";


}
catch(error){


console.error(

error

);


document

.getElementById(

"status"

)

.innerHTML =

'<div class="error">' +

'Save error: ' +

error.message +

'</div>';


}
finally{


saveInProgress =

false;


button.disabled =

false;


button.textContent =

"SAVE RECORD";


}


}


/************************************************
 * START
 ************************************************/


loadDashboard();


</script>


</body>

</html>
