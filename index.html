<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
padding:15px;
max-width:700px;
margin:auto;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#0066cc;
color:white;
border:none;
cursor:pointer;
}

.success{
color:green;
font-weight:bold;
}

#reader{
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>MLK Resident App</h2>

<div id="reader"></div>

<label>Serial Number</label>
<input id="serial">

<label>Defect</label>
<select id="defect">
<option value="D001|Rysa">D001 - Rysa</option>
<option value="D002|Funkcja">D002 - Funkcja</option>
<option value="D003|Wysrebrzenie">D003 - Wysrebrzenie</option>
<option value="D004|Ostre krawędzie">D004 - Ostre krawędzie</option>
<option value="D005|Ciało obce">D005 - Ciało obce</option>
<option value="D006|Wtrącenie">D006 - Wtrącenie</option>
<option value="D999|Inne">D999 - Inne</option>
</select>

<label>Comment</label>
<textarea id="comment"></textarea>

<label>Quantity</label>
<input id="qty" type="number" value="1">

<label>OEM</label>
<select id="oem">
<option>BMW</option>
<option>VW</option>
<option>SEAT</option>
<option>AUDI</option>
<option>STELLANTIS</option>
</select>

<label>Customer Label</label>
<input
type="file"
id="labelPhoto"
accept="image/*"
capture="environment">

<label>Failure Photo</label>
<input
type="file"
id="photo"
accept="image/*"
capture="environment">

<label>User</label>
<input id="user" value="Konrad">

<button type="button" onclick="saveData()">
SAVE
</button>

<div id="status"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby6V6Md2nCXcavnTMWOUILAPPWeQ_lE23NwQ1lnH6KIFmMhik8tSXHT2ihy-cgC9H27/exec";

let saveInProgress = false;
let lastScan = "";
let lastScanTime = 0;

function beepSuccess(){

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

const osc1 =
audioCtx.createOscillator();

osc1.frequency.value = 1500;
osc1.connect(audioCtx.destination);
osc1.start();
osc1.stop(audioCtx.currentTime + 0.08);

const osc2 =
audioCtx.createOscillator();

osc2.frequency.value = 2200;
osc2.connect(audioCtx.destination);
osc2.start(audioCtx.currentTime + 0.12);
osc2.stop(audioCtx.currentTime + 0.20);

}

function onScanSuccess(text){

const now = Date.now();

if(
text === lastScan &&
(now - lastScanTime) < 10000
){
return;
}

lastScan = text;
lastScanTime = now;

document.getElementById("serial").value = text;

navigator.vibrate?.([100,50,100]);

beepSuccess();

}

new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
).render(onScanSuccess);

async function saveData(){

if(saveInProgress){
return;
}

const serial =
document.getElementById("serial")
.value.trim();

if(!serial){

alert("Scan QR first");
return;

}

saveInProgress = true;

const defect =
document.getElementById("defect")
.value;

const parts =
defect.split("|");

const labelFile =
document.getElementById("labelPhoto")
.files[0];

const file =
document.getElementById("photo")
.files[0];

let image = "";
let labelImage = "";

if(labelFile){

labelImage =
await new Promise(resolve=>{

const reader =
new FileReader();

reader.onload =
e=>resolve(e.target.result);

reader.readAsDataURL(labelFile);

});

}

if(file){

image =
await new Promise(resolve=>{

const reader =
new FileReader();

reader.onload =
e=>resolve(e.target.result);

reader.readAsDataURL(file);

});

}

const payload = {

serial:serial,
defectCode:parts[0],
defectName:parts[1],
comment:document.getElementById("comment").value,
qty:document.getElementById("qty").value,
oem:document.getElementById("oem").value,
user:document.getElementById("user").value,
labelImage:labelImage,
image:image

};

try{

const response =
await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

const text =
await response.text();

console.log(text);

const result =
JSON.parse(text);

if(result.status === "DUPLICATE"){

alert(
"Serial Number already exists:\n\n" +
serial
);

saveInProgress = false;
return;

}

beepSuccess();

navigator.vibrate?.([100,50,100]);

document.getElementById("status")
.innerHTML =
'<p class="success">Saved: '
+ result.id +
'</p>';

document.getElementById("serial").value = "";
document.getElementById("comment").value = "";
document.getElementById("photo").value = "";
document.getElementById("labelPhoto").value = "";
document.getElementById("qty").value = "1";

window.scrollTo({
top:0,
behavior:"smooth"
});

saveInProgress = false;

}
catch(error){

saveInProgress = false;

console.error(error);

alert(
"Save error:\n\n" +
error.message
);

}

}

</script>

</body>

</html>
